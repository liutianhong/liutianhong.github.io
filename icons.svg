<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <defs>
        <!-- 通用渐变（可选，用于特定场景） -->
        <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
    </defs>

    <!-- 图标1：完整博客图标（无限符号 + 闪电，与 favicon 一致，但无背景板，方便缩放） -->
    <symbol id="blog-icon" viewBox="0 0 64 64">
        <!-- 无限符号 -->
        <path d="M10 32 C10 18, 24 18, 32 32 C40 46, 54 46, 54 32 C54 18, 40 18, 32 32 C24 46, 10 46, 10 32Z"
              fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
        <!-- 闪电（与 favicon 参数一致） -->
        <g transform="translate(50, 15) scale(1.1) rotate(15)">
            <path d="M1 0 L-4 7 L2 7 L-2 14 L6 5 L0 5 L4 0 Z"
                  fill="currentColor" stroke="currentColor" stroke-width="0.9" stroke-linejoin="round"/>
        </g>
    </symbol>

    <!-- 图标2：纯无限符号（无闪电，可用于分类、归档等） -->
    <symbol id="infinity-icon" viewBox="0 0 64 64">
        <path d="M10 32 C10 18, 24 18, 32 32 C40 46, 54 46, 54 32 C54 18, 40 18, 32 32 C24 46, 10 46, 10 32Z"
              fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
    </symbol>
</svg>