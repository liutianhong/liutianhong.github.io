<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#1e1b4b"/>
        </linearGradient>
    </defs>
    <rect width="64" height="64" rx="14" fill="url(#bg)"/>

    <!-- 无限符号（居中） -->
    <path d="M10 32 C10 18, 24 18, 32 32 C40 46, 54 46, 54 32 C54 18, 40 18, 32 32 C24 46, 10 46, 10 32Z"
          fill="none" stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- 原始闪电路径，放大 1.2 倍，位置稍右移下移 -->
    <g transform="translate(50, 15) scale(1.1) rotate(15)">
        <path d="M1 0 L-4 7 L2 7 L-2 14 L6 5 L0 5 L4 0 Z"
              fill="#fbbf24" stroke="#f59e0b" stroke-width="0.9" stroke-linejoin="round"/>
    </g>
</svg>